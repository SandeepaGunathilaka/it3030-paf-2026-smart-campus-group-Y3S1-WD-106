spring.application.name=scampus-backend

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/scampus_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rootpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:scampus_jwt_super_secret_key_that_is_long_enough_for_hs512_algorithm_min64bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── OAuth2 Google ─────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}

# ── App URLs ──────────────────────────────────────────────────────────────────
app.oauth2.authorized-redirect-uris=${FRONTEND_REDIRECT_URL:http://localhost:5173/oauth2/redirect}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── Super Admin ───────────────────────────────────────────────────────────────
app.super-admin.email=${SUPER_ADMIN_EMAIL:janeeshapaba@gmail.com}

# ── File Upload ───────────────────────────────────────────────────────────────
app.upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081
